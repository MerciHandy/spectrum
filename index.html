<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Merci Handy · Spectrum</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0d0d0f;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Inter',system-ui,sans-serif;
}
.card{
  background:#141417;
  border:1px solid #2a2a32;
  border-radius:16px;
  padding:48px 40px;
  width:100%;
  max-width:380px;
  text-align:center;
}
.logo{
  font-size:28px;
  font-weight:800;
  background:linear-gradient(135deg,#E464F7,#FEA8D9);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
  letter-spacing:-0.5px;
}
.subtitle{
  font-size:11px;
  color:#7a7490;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:36px;
}
.rainbow{
  font-size:32px;
  margin-bottom:24px;
}
label{
  display:block;
  font-size:9px;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#7a7490;
  text-align:left;
  margin-bottom:8px;
}
input{
  width:100%;
  padding:12px 16px;
  background:#1c1c21;
  border:1.5px solid #2a2a32;
  border-radius:8px;
  color:#f5f0ff;
  font-size:14px;
  font-family:inherit;
  outline:none;
  transition:border .2s;
  margin-bottom:16px;
}
input:focus{border-color:#E464F7}
button{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,#E464F7,#FEA8D9);
  border:none;
  border-radius:8px;
  color:#000;
  font-size:13px;
  font-weight:800;
  font-family:inherit;
  cursor:pointer;
  letter-spacing:0.5px;
  transition:opacity .15s;
}
button:hover{opacity:.9}
.error{
  color:#ff6b6b;
  font-size:11px;
  margin-top:12px;
  display:none;
}
.footer{
  font-size:9px;
  color:#3a3a46;
  margin-top:28px;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div class="card">
  <div class="rainbow">🌈</div>
  <div class="logo">merci handy</div>
  <div class="subtitle">Spectrum · Dashboard</div>
  <label>Mot de passe</label>
  <input type="password" id="pwd" placeholder="••••••••••••••" onkeydown="if(event.key==='Enter')check()">
  <button onclick="check()">Accéder au dashboard →</button>
  <div class="error" id="err">Mot de passe incorrect 🦄</div>
  <div class="footer">Accès réservé à l'équipe Merci Handy</div>
</div>
<script>
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function check(){
  const val=document.getElementById('pwd').value;
  const hash=await sha256(val);
  if(hash==='4fdbdd4f0fac3fe007b5cc199d56b3cb4e8c1db5ac61ad86507da0dd195201a7'){
    sessionStorage.setItem('mh_auth',hash);
    window.location.href='dashboard.html';
  }else{
    document.getElementById('err').style.display='block';
    document.getElementById('pwd').style.borderColor='#ff6b6b';
    setTimeout(()=>document.getElementById('pwd').style.borderColor='#2a2a32',2000);
  }
}
// Auto-redirect if already authenticated
(async()=>{
  const stored=sessionStorage.getItem('mh_auth');
  if(stored==='4fdbdd4f0fac3fe007b5cc199d56b3cb4e8c1db5ac61ad86507da0dd195201a7')window.location.href='dashboard.html';
})();
</script>
</body>
</html>
